name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  python-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Run repo CI validation
        run: python3 scripts/quality.py ci
